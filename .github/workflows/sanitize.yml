name: Sanitizers

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  asan:
    name: ASAN+UBSAN (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libavfilter-dev libopencv-dev libyaml-cpp-dev libsodium-dev libsqlite3-dev \
            libcurl4-openssl-dev nlohmann-json3-dev libssl-dev python3-dev python3-numpy \
            libfmt-dev libspdlog-dev
      - name: Configure + build (ASAN/UBSAN)
        run: |
          cmake -S . -B build -G Ninja \
            -DNVR_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DNVR_ENABLE_ASAN=ON \
            -DNVR_ENABLE_UBSAN=ON
          cmake --build build -j
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build --output-on-failure
