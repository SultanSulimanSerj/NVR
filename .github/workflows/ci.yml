name: CI
# C++: configure with NVR_BUILD_TESTS=ON, build, ctest on Ubuntu 22.04/24.04.
# Playwright: enable job `e2e` by setting repository variable NVR_E2E_BASE_URL (+ secret NVR_E2E_ADMIN_PASSWORD).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache apt
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt
            /var/lib/apt/lists
          key: apt-${{ matrix.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            apt-${{ matrix.os }}-

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            libavfilter-dev libopencv-dev libyaml-cpp-dev libsodium-dev libsqlite3-dev \
            libcurl4-openssl-dev nlohmann-json3-dev libssl-dev python3-dev python3-numpy \
            libfmt-dev libspdlog-dev

      - name: Configure (Release + hardening)
        run: cmake -S . -B build -G Ninja -DNVR_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: HTTP smoke (optional staging URL)
        if: ${{ vars.NVR_CI_HTTP_SMOKE_URL != '' }}
        env:
          NVR_CI_HTTP_SMOKE_URL: ${{ vars.NVR_CI_HTTP_SMOKE_URL }}
        run: bash scripts/ci_http_smoke.sh

      - name: Package .deb
        run: |
          cd build
          cpack -G DEB

      - name: Compute sha256
        run: |
          mkdir -p dist
          cp build/*.deb dist/
          (cd dist && sha256sum *.deb > SHA256SUMS-${{ matrix.os }}.txt)

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: nvr-prototype-${{ matrix.os }}-deb
          path: dist/

  webui:
    name: Build Web UI
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: webui/package-lock.json }
      - name: Install + build webui
        run: |
          cd webui
          npm ci
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: nvr-webui-dist
          path: webui/dist

  nvr-shell:
    name: Build nvr-shell (Rust)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo build
        run: cd nvr-shell && cargo build --release

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-24.04
    if: ${{ vars.NVR_E2E_BASE_URL != '' }}
    needs: [webui]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: webui/package-lock.json }
      - name: Install + Playwright browsers
        run: |
          cd webui
          npm ci
          npx playwright install --with-deps chromium firefox
      - name: Run e2e
        env:
          NVR_E2E_BASE_URL: ${{ vars.NVR_E2E_BASE_URL }}
          NVR_E2E_ADMIN_PASSWORD: ${{ secrets.NVR_E2E_ADMIN_PASSWORD }}
        run: cd webui && npm run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: webui/playwright-report
