repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=4096]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]

  - repo: local
    hooks:
      - id: eslint
        name: eslint webui
        entry: bash -c 'cd webui && npx --no-install eslint . --max-warnings=0'
        language: system
        files: ^webui/.*\.(ts|tsx)$
        pass_filenames: false
      - id: prettier
        name: prettier webui
        entry: bash -c 'cd webui && npx --no-install prettier -c .'
        language: system
        files: ^webui/.*\.(ts|tsx|css|json)$
        pass_filenames: false
      - id: tsc-check
        name: tsc webui
        entry: bash -c 'cd webui && npx --no-install tsc --noEmit'
        language: system
        files: ^webui/.*\.(ts|tsx)$
        pass_filenames: false
