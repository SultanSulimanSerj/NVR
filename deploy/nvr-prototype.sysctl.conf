# /etc/sysctl.d/99-nvr-prototype.conf
# Параметры подобраны под NVR с десятками RTSP-камер. Перепроверять под нагрузкой.

# --- Сеть: приём RTP/RTSP с многих источников ---
net.core.rmem_default = 4194304
net.core.rmem_max     = 33554432
net.core.wmem_default = 1048576
net.core.wmem_max     = 16777216
net.core.netdev_max_backlog       = 16384
net.core.netdev_budget            = 600
net.core.somaxconn                = 4096

net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.ipv4.tcp_mtu_probing          = 1
net.ipv4.tcp_fastopen             = 3
net.ipv4.tcp_slow_start_after_idle = 0
net.ipv4.udp_rmem_min             = 65536
net.ipv4.udp_wmem_min             = 65536
net.ipv4.tcp_keepalive_time       = 60
net.ipv4.tcp_keepalive_intvl      = 10
net.ipv4.tcp_keepalive_probes     = 6

# --- Файловые дескрипторы и inotify (много сегментов в архиве) ---
fs.file-max                  = 2097152
fs.inotify.max_user_watches  = 524288
fs.inotify.max_user_instances = 8192

# --- Диск/IO: уменьшаем длинные пики flush'а при последовательной записи ---
vm.dirty_background_ratio = 5
vm.dirty_ratio            = 15
vm.dirty_expire_centisecs = 1500
vm.swappiness             = 10
vm.vfs_cache_pressure     = 50
