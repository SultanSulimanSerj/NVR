# Nginx reverse-proxy for the NVR appliance.
# Terminates TLS (via certbot or self-signed) and caches HLS segments to lower
# CPU load. The C++ daemon listens on 127.0.0.1:8080 only — anything that
# reaches the box from the outside must come through this server block.

proxy_cache_path /var/cache/nginx/hls keys_zone=hls_cache:16m levels=1:2
                  inactive=10m max_size=2g use_temp_path=off;

# Burst-friendly per-IP rate limit for the JSON API. HLS gets a separate, more
# permissive zone because a single tab can fire ~6 requests/s on a busy grid.
limit_req_zone $binary_remote_addr zone=nvr_api:10m  rate=20r/s;
limit_req_zone $binary_remote_addr zone=nvr_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=nvr_hls:10m  rate=120r/s;

# Slow-clients defence: drop a connection if it hasn't read anything for 30s.
limit_conn_zone $binary_remote_addr zone=nvr_conn:10m;

upstream nvr_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ---- Reusable SSL snippets ----------------------------------------------------
# letsencrypt: production deployment with certbot's renewable cert.
# self-signed: appliance default for first boot before a customer wires DNS.
# Switch between them in setup_ubuntu_nvr.sh / nvr-update post-step.
#
#   include /etc/nginx/snippets/nvr-ssl-letsencrypt.conf;
#   include /etc/nginx/snippets/nvr-ssl-self-signed.conf;
#
# The snippets themselves are shipped under deploy/nginx/snippets/.

# Modern Mozilla profile: TLS1.2+ with PFS. ssl_prefer_server_ciphers stays off
# for TLS1.3 (cipher negotiation is client-driven).
map $sent_http_content_type $nvr_csp_extra {
    default                                   "";
    "~^text/html"                             "; frame-ancestors 'none'";
}

server {
    listen 80;
    listen [::]:80;
    server_name _ nvr.local;
    # certbot HTTP-01 still needs to land on port 80.
    location /.well-known/acme-challenge/ { root /var/lib/letsencrypt; }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _ nvr.local;

    # Operators choose one of the snippets at provisioning time.
    include /etc/nginx/snippets/nvr-ssl.conf;

    # Mozilla "intermediate" profile (Mar 2025).
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache       shared:nvrSsl:16m;
    ssl_session_timeout     1d;
    ssl_session_tickets     off;

    # OCSP stapling – set ssl_trusted_certificate via the snippet.
    ssl_stapling            on;
    ssl_stapling_verify     on;
    resolver                1.1.1.1 9.9.9.9 valid=300s ipv6=off;
    resolver_timeout        5s;

    # Connection limits and slow-loris defences.
    limit_conn              nvr_conn 32;
    client_max_body_size    64m;
    client_body_timeout     30s;
    client_header_timeout   30s;
    send_timeout            30s;
    keepalive_timeout       65s;

    include /etc/nginx/conf.d/*.conf;

    gzip on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css image/svg+xml application/manifest+json;

    # ---- Security headers -----------------------------------------------------
    # HSTS preload-ready (2y) — only enable preload after DNS is final.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
    # CSP allows live HLS via blob/media, no third-party scripts. Tighten by app.
    add_header Content-Security-Policy    "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; object-src 'none'; base-uri 'self'$nvr_csp_extra" always;

    # ---- /metrics: loopback only ---------------------------------------------
    location = /metrics {
        allow 127.0.0.1;
        allow ::1;
        deny  all;
        proxy_pass http://nvr_backend;
        proxy_set_header Host $host;
    }

    # ---- Auth endpoints: tighter rate limit ----------------------------------
    location ~ ^/api/v1/auth/(login|refresh|logout|2fa) {
        limit_req zone=nvr_auth burst=10 nodelay;
        proxy_pass http://nvr_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Setup token endpoint: very tight ------------------------------------
    location ~ ^/api/v1/setup/finalize$ {
        limit_req zone=nvr_auth burst=2 nodelay;
        proxy_pass http://nvr_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- HLS streams ----------------------------------------------------------
    location /live/ {
        limit_req zone=nvr_hls burst=200 nodelay;
        proxy_pass http://nvr_backend;
        proxy_cache hls_cache;
        proxy_cache_key   "$scheme$host$request_uri";
        proxy_cache_valid 200 2s;
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_buffering on;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- WebSocket ------------------------------------------------------------
    location /api/v1/ws {
        proxy_pass http://nvr_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Default JSON API + UI -----------------------------------------------
    location / {
        limit_req zone=nvr_api burst=40 nodelay;
        proxy_pass http://nvr_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-NVR-Archive-Accel "1";
    }

    # Internal redirect target for authenticated archive playback (see HttpServer
    # X-Accel-Redirect). `alias` must match archive.root_path — regenerate with
    # `nvr_sync_nginx_archive_accel.sh` after changing the archive directory.
    include /etc/nvr-prototype/nginx-archive-accel.conf;
}
