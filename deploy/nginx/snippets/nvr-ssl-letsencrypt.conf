# nvr-ssl-letsencrypt.conf — include from /etc/nginx/sites-enabled/nvr.conf
# when the appliance has a Let's Encrypt cert provisioned by certbot.
ssl_certificate           /etc/letsencrypt/live/nvr/fullchain.pem;
ssl_certificate_key       /etc/letsencrypt/live/nvr/privkey.pem;
ssl_trusted_certificate   /etc/letsencrypt/live/nvr/chain.pem;
