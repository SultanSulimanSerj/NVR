# nvr-ssl-self-signed.conf — first-boot default. The cert is generated by
# scripts/setup_ubuntu_nvr.sh / autoinstall late-commands. OCSP stapling is
# pointless for self-signed certs; the resolver is also unused here.
ssl_certificate           /etc/nvr-prototype/tls/cert.pem;
ssl_certificate_key       /etc/nvr-prototype/tls/key.pem;
# No ssl_trusted_certificate — OCSP stapling will be a noop.
