set timeout=3
set default=0

menuentry "NVR Appliance" {
    set gfxpayload=keep
    linux   /boot/vmlinuz quiet splash plymouth.ignore-serial-consoles
    initrd  /boot/initrd.img
}

menuentry "NVR Recovery (single-user)" {
    set gfxpayload=text
    linux   /boot/vmlinuz single nvr.recovery=1
    initrd  /boot/initrd.img
}
